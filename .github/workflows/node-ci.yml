name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: "20"
      
      # INSTALL Javascript Packages dulz :)
      - name: Install dependencies
        run: npm install
      
      # Run some test, untuk make sure dia otomatis eksekusi suatu proses
      - name: Run tests
        run: npm test      