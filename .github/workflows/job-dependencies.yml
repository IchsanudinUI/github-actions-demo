name: Job Dependencies

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # yep, ini literally buat check awal sekali, bahwa job kamu sudah initialized
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Run tests
        run: npm test

      # Ingat, step ini tuh untuk simulasi kondisi software sudah di distribution directory
      - name: Build project
        run: |
          mkdir dist
          echo "Build artifact created at $(date)" > dist/build.txt
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist


  # GELOO, ini dia, 2nd job, dengan CONDITIONAL need build to fullt execute first :)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist

      - name: Deploy project
        run: |
          echo "Deploying project..."
          ls -R dist
          echo "Deployment successful!"

          






